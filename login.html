<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Check by Gourab-v1</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            overflow: hidden;
        }

        /* গ্লাস ইফেক্ট কার্ড */
        .auth-card {
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 25px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            text-align: center;
            animation: fadeIn 1s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .auth-card h2 {
            color: #00d2ff;
            font-weight: 800;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .auth-card p { color: #ccc; font-size: 0.9rem; margin-bottom: 30px; }

        .input-group {
            position: relative;
            margin-bottom: 20px;
        }

        .input-group i {
            position: absolute;
            left: 15px;
            top: 15px;
            color: #00d2ff;
        }

        .form-control {
            background: rgba(255, 255, 255, 0.05) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            border-radius: 12px !important;
            padding: 12px 15px 12px 45px !important;
            color: #fff !important;
            transition: 0.3s;
        }

        .form-control:focus {
            background: rgba(255, 255, 255, 0.1) !important;
            border-color: #00d2ff !important;
            box-shadow: 0 0 10px rgba(0, 210, 255, 0.3);
        }

        /* পাসওয়ার্ড টগল আইকন */
        .toggle-password {
            position: absolute;
            right: 15px;
            top: 15px;
            cursor: pointer;
            color: #aaa;
            transition: 0.3s;
        }

        .toggle-password:hover { color: #00d2ff; }

        .btn-auth {
            background: linear-gradient(45deg, #00d2ff, #3a7bd5);
            border: none;
            border-radius: 12px;
            padding: 12px;
            width: 100%;
            font-weight: bold;
            color: #fff;
            margin-top: 10px;
            transition: 0.4s;
            box-shadow: 0 5px 15px rgba(0, 210, 255, 0.3);
        }

        .btn-auth:hover {
            transform: scale(1.03);
            box-shadow: 0 8px 20px rgba(0, 210, 255, 0.5);
        }

        .footer-link { color: #ccc; margin-top: 20px; font-size: 0.85rem; }
        .footer-link a { color: #00d2ff; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

<div class="auth-card">
    <h2>Login</h2>
    <p>Welcome back, Admin!</p>
    
    <form id="loginForm">
        <div class="input-group">
            <i class="fas fa-user"></i>
            <input type="text" class="form-control" placeholder="ইউজারনেম দিন" required>
        </div>
        
        <div class="input-group">
            <i class="fas fa-lock"></i>
            <input type="password" id="password" class="form-control" placeholder="পাসওয়ার্ড দিন" required>
            <span class="toggle-password" onclick="togglePass('password', 'eyeIcon')">
                <i class="fas fa-eye-slash" id="eyeIcon"></i>
            </span>
        </div>

        <button type="submit" class="btn-auth">প্রবেশ করুন</button>
    </form>

    <div class="footer-link">
        অ্যাকাউন্ট নেই? <a href="register.html">রেজিস্ট্রেশন করুন</a>
    </div>
</div>

<script>
    function togglePass(inputId, iconId) {
        const input = document.getElementById(inputId);
        const icon = document.getElementById(iconId);
        if (input.type === "password") {
            input.type = "text";
            icon.classList.replace("fa-eye-slash", "fa-eye");
        } else {
            input.type = "password";
            icon.classList.replace("fa-eye", "fa-eye-slash");
        }
    }
</script>

</body>
</html>
