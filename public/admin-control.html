<html lang="bn">
<head>
    <meta charset="UTF-8">

    <title>Master Admin V2 | Gourab Tech</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #0f141e;
            --card-bg: rgba(255, 255, 255, 0.08);
            --accent-cyan: #00d2ff;
            --btn-green: #22c55e;
            --btn-red: #ef4444;
            --text-color: #f3f4f6;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        
        body { 
            background-color: var(--bg-dark); 
            color: var(--text-color);

            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .container { width: 100%; max-width: 600px; animation: fadeIn 0.8s ease; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        h1 { 
            text-align: center; 
            color: var(--accent-cyan); 
            font-size: 1.8rem; 
            margin: 20px 0; 
            text-transform: uppercase; 
            letter-spacing: 2px;
            font-weight: 800;
        }

        /* কন্ট্রোল কার্ড ডিজাইন */
        .control-card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
        }

        .card-header {
            color: var(--accent-cyan);
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* বাটন স্টাইল */
        .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        
        .btn {
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            color: white;
            cursor: pointer;
            transition: 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 0.9rem;
        }

        .btn:hover { transform: translateY(-3px); opacity: 0.9; }

        .btn-on { background: var(--btn-green); }
        .btn-off { background: var(--btn-red); }
        .btn-update { 
            background: linear-gradient(90deg, #00d2ff, #3a7bd5); 
            width: 100%; margin-top: 15px;
            color: #000;
        }

        /* ইনপুট বক্স */
        input[type="text"] {
            width: 100%;
            padding: 12px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            color: white;
            font-size: 1rem;
            margin-top: 5px;
        }

        input:focus { outline: none; border-color: var(--accent-cyan); }

        /* ইউজার কন্ট্রোল সেকশন */
        .user-section-title { margin: 35px 0 20px; color: var(--accent-cyan); font-weight: 700; border-left: 4px solid var(--accent-cyan); padding-left: 10px; }

            background: rgba(255, 255, 255, 0.05);

<body>

    <div class="container">
        <h1>MASTER CONTROL V2</h1>

        <div class="control-card">
            <div class="card-header"><i class="fas fa-power-off"></i> System Status</div>
            <div class="btn-row">
                <button class="btn btn-on" onclick="updateGlobal({isSiteActive: true})"><i class="fas fa-check-circle"></i> SITE ON</button>
                <button class="btn btn-off" onclick="updateGlobal({isSiteActive: false})"><i class="fas fa-times-circle"></i> SITE OFF</button>
            </div>
        </div>

        <div class="control-card">
            <div class="card-header"><i class="fas fa-crown"></i> Premium Access</div>
            <div class="btn-row">
                <button class="btn btn-on" onclick="updateGlobal({isPremiumMode: true})">ENABLE PRO</button>
                <button class="btn btn-off" onclick="updateGlobal({isPremiumMode: false})">DISABLE PRO</button>
            </div>
        </div>

        <div class="control-card">
            <div class="card-header"><i class="fas fa-money-bill-wave"></i> Price Control</div>
            <input type="text" id="pPrice" placeholder="টাকার পরিমাণ লিখুন...">
            <button class="btn btn-update" onclick="savePayment()">Update Price Info</button>
        </div>

        <h2 class="user-section-title"><i class="fas fa-users-cog"></i> User Management</h2>
        
        <div id="userContainer">
            <p style="text-align:center; opacity:0.5;">লোডিং হচ্ছে...</p>
        </div>
    </div>

    <script>
        // গ্লোবাল সেটিংস আপডেট
        async function updateGlobal(data) {
            try {
                const res = await fetch('/api/admin/update-settings', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(data)
                });
                if(res.ok) alert("সিস্টেম সফলভাবে আপডেট হয়েছে!");
            } catch (e) { alert("Error updating settings"); }
        }

        // পেমেন্ট সেভ করা
        async function savePayment() {
            const price = document.getElementById('pPrice').value;
            await updateGlobal({ paymentPrice: price });
        }

        // ইউজার লিস্ট আনা
        async function fetchUsers() {
            try {
                const res = await fetch('/api/admin/users');
                const users = await res.json();
                const container = document.getElementById('userContainer');
                container.innerHTML = '';

                // ৮টি চেকার টুলের নাম (ড্যাশবোর্ডের সাথে মিলিয়ে)
                const tools = ['FB-Check', 'Pass-Pro', 'IP-Scan', 'Mail-Pro', 'Dev-Scanner', 'Link-Safe', 'User-Hunt', 'Firewall'];

                users.forEach(user => {
                    container.innerHTML += `
                        <div class="user-card">
                            <div class="user-info">
                                <i class="fas fa-user-circle"></i> ${user.name} 
                                <span style="font-size:0.7rem; color:var(--accent-cyan); display:block; opacity:0.7;">${user.email}</span>
                            </div>
                            <div class="checker-grid">
                                ${tools.map((tool, i) => `
                                    <div class="checker-item">
                                        <label>${tool}</label>
                                        <input type="checkbox" id="tool-${user._id}-${i}" ${user.permissions?.activeCheckers?.includes(tool) ? 'checked' : ''}>
                                    </div>
                                `).join('')}
                            </div>
                            <div class="btn-row">
                                <button class="btn btn-on" style="background:#3b82f6" onclick="manageUser('${user._id}', 'Approved')">Save Settings</button>
                                <button class="btn btn-off" onclick="manageUser('${user._id}', 'Blocked')">Block User</button>
                            </div>
                        </div>
                    `;
                });
            } catch (e) { console.error("Error fetching users", e); }
        }

        // ইউজারের পারমিশন ও স্ট্যাটাস সেভ করা
        async function manageUser(userId, status) {
            const checkers = [];
            const labels = ['FB-Check', 'Pass-Pro', 'IP-Scan', 'Mail-Pro', 'Dev-Scanner', 'Link-Safe', 'User-Hunt', 'Firewall'];
            
            for(let i=0; i<8; i++) {
                const checkbox = document.getElementById(`tool-${userId}-${i}`);
                if(checkbox && checkbox.checked) checkers.push(labels[i]);
            }

            try {
                const res = await fetch('/api/admin/manage-user', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ userId, status, checkers })
                });
                if(res.ok) {
                    alert(`ইউজার ${status === 'Blocked' ? 'ব্লক' : 'আপডেট'} করা হয়েছে!`);
                    fetchUsers();
                }
            } catch (e) { alert("Action failed!"); }
        }

        window.onload = fetchUsers;
    </script>
</body>
</html>
