<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gourab Ultra Control | Master Edition</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-master: #070b14;
            --card-glass: rgba(255, 255, 255, 0.03);
            --accent-cyan: #00f2ff;
            --accent-purple: #7000ff;
            --btn-green: #00ff87;
            --btn-red: #ff3e3e;
            --text-glow: #e0faff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        
        body { 
            background: radial-gradient(circle at top right, #1a1f35, var(--bg-master));
            color: white;
            padding: 15px;
            min-height: 100vh;
        }

        .container { width: 100%; max-width: 550px; margin: auto; animation: slideIn 0.6s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        h1 { 
            text-align: center; 
            font-size: 1.6rem; 
            background: linear-gradient(to right, var(--accent-cyan), var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 25px 0;
            letter-spacing: 3px;
            font-weight: 900;
        }

        /* --- স্মার্ট কার্ড ডিজাইন --- */
        .control-card {
            background: var(--card-glass);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 20px;
            backdrop-filter: blur(15px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }

        .card-title {
            font-size: 1rem;
            font-weight: 600;
            color: var(--accent-cyan);
            margin-bottom: 18px;
            display: flex;
            align-items: center;
            gap: 12px;
            text-transform: uppercase;
        }

        /* --- গ্রিড বাটন সিস্টেম --- */
        .grid-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        
        .master-btn {
            padding: 14px;
            border: none;
            border-radius: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 0.85rem;
            color: #000;
        }

        .master-btn:active { transform: scale(0.95); }

        .btn-cyan { background: var(--accent-cyan); box-shadow: 0 0 15px rgba(0, 242, 255, 0.3); }
        .btn-red { background: var(--btn-red); color: white; }
        .btn-green { background: var(--btn-green); }
        .btn-outline { background: transparent; border: 1px solid var(--accent-cyan); color: var(--accent-cyan); }

        /* --- থিম সিলেক্টর স্টাইল --- */
        .theme-select {
            width: 100%;
            padding: 12px;
            background: rgba(0,0,0,0.5);
            color: white;
            border-radius: 12px;
            border: 1px solid var(--accent-cyan);
            outline: none;
            margin-bottom: 10px;
        }

        /* --- আল্ট্রা ইনপুট --- */
        input[type="text"] {
            width: 100%;
            padding: 14px;
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            color: white;
            outline: none;
            transition: 0.3s;
        }

        /* --- ইউজার সেকশন --- */
        .user-card {
            background: rgba(255,255,255,0.02);
            border-radius: 20px;
            padding: 18px;
            margin-bottom: 15px;
            border-left: 4px solid var(--accent-cyan);
        }

        .user-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 15px; }
        .user-name { font-weight: 700; color: #fff; font-size: 1.05rem; }
        .user-email { font-size: 0.75rem; color: #888; display: block; }

        .tools-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            margin-bottom: 15px;
        }

        .tool-box {
            background: rgba(0,0,0,0.3);
            padding: 10px;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.8rem;
        }

        .toggle-switch {
            width: 35px;
            height: 18px;
            appearance: none;
            background: #333;
            border-radius: 20px;
            position: relative;
            cursor: pointer;
            transition: 0.3s;
        }
        .toggle-switch:checked { background: var(--btn-green); }
        .toggle-switch::before {
            content: '';
            width: 14px; height: 14px;
            background: #fff;
            border-radius: 50%;
            position: absolute; top: 2px; left: 2px;
            transition: 0.3s;
        }
        .toggle-switch:checked::before { left: 19px; }

        .status-badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 700;
        }
        .status-active { background: rgba(0, 255, 135, 0.1); color: var(--btn-green); }

    </style>
</head>
<body>

    <div class="container">
        <h1>GOURAB MASTER V2</h1>

        <div class="control-card">
            <div class="card-title"><i class="fas fa-microchip"></i> Server Control</div>
            <div class="grid-buttons">
                <button class="master-btn btn-green" onclick="updateSite(true)"><i class="fas fa-play"></i> LIVE ON</button>
                <button class="master-btn btn-red" onclick="updateSite(false)"><i class="fas fa-power-off"></i> KILL SITE</button>
            </div>
        </div>

        <div class="control-card">
            <div class="card-title"><i class="fas fa-paint-brush"></i> UI Theme & Access</div>
            <select id="themeSelect" class="theme-select">
                <option value="dark-ocean">Dark Ocean (ডিফল্ট)</option>
                <option value="neon-night">Neon Night (নীল-গোলাপি)</option>
                <option value="gold-premium">Gold Premium (রাজকীয়)</option>
                <option value="cyber-punk">Cyber Punk (হলুদ-কালো)</option>
            </select>
            <div class="grid-buttons">
                <button class="master-btn btn-cyan" onclick="updateReg(true)">REG OPEN</button>
                <button class="master-btn btn-outline" onclick="updateReg(false)">REG CLOSED</button>
            </div>
            <button class="master-btn btn-cyan" style="width: 100%; margin-top: 10px;" onclick="saveTheme()">APPLY NEW THEME</button>
        </div>

        <div class="control-card">
            <div class="card-title"><i class="fas fa-database"></i> Database Engine</div>
            <div class="grid-buttons">
                <button class="master-btn btn-cyan" onclick="switchDB('primary')">PRIMARY CLOUD</button>
                <button class="master-btn btn-outline" onclick="switchDB('backup')">BACKUP CLOUD</button>
            </div>
        </div>

        <div class="control-card">
            <div class="card-title"><i class="fas fa-bell"></i> Global Notice</div>
            <div class="input-group">
                <input type="text" id="globalNotice" placeholder="ইউজারদের জন্য কোনো বার্তা লিখুন...">
                <button class="master-btn btn-cyan" style="width: 100%; margin-top: 12px;" onclick="saveNotice()">PUSH NOTICE</button>
            </div>
        </div>

        <h2 style="color: var(--accent-cyan); font-size: 1.1rem; margin: 30px 0 15px; letter-spacing: 1px;">
            <i class="fas fa-users"></i> LIVE USER MANAGEMENT
        </h2>
        
        <div id="userList"></div>
    </div>

    <script>
        async function updateSite(status) {
            await fetch('/api/admin/update-settings', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ isSiteActive: status })
            });
            alert(status ? "সাইট লাইভ হয়েছে!" : "সাইট অফ করা হয়েছে!");
        }

        async function updateReg(status) {
            const msg = status ? "নতুন রেজিস্ট্রেশন চালু" : "এডমিন রেজিস্ট্রেশন অফ করে দিয়েছে, এডমিনের সাথে যোগাযোগ করুন।";
            await fetch('/api/admin/update-settings', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ isPremiumMode: status, registerNotice: msg })
            });
            alert("রেজিস্ট্রেশন এক্সেস আপডেট হয়েছে!");
        }

        async function saveTheme() {
            const theme = document.getElementById('themeSelect').value;
            await fetch('/api/admin/update-settings', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ 
                    "themeConfig.loginTheme": theme,
                    "themeConfig.registerTheme": theme 
                })
            });
            alert("লগইন ও রেজিস্ট্রেশন থিম পরিবর্তন করা হয়েছে!");
        }

        async function switchDB(type) {
            const res = await fetch('/api/admin/switch-db', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ dbType: type })
            });
            const data = await res.json();
            alert(data.message);
        }

        async function saveNotice() {
            const note = document.getElementById('globalNotice').value;
            await fetch('/api/admin/update-settings', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ displayNotice: note })
            });
            alert("সবার ড্যাশবোর্ডে নোটিশ পাঠানো হয়েছে!");
        }

        async function loadUsers() {
            const res = await fetch('/api/admin/users');
            const users = await res.json();
            const list = document.getElementById('userList');
            list.innerHTML = '';
            const tools = ['FB-Check', 'Pass-Pro', 'IP-Scan', 'Mail-Pro', 'Dev-Scanner', 'Link-Safe', 'User-Hunt', 'Firewall'];

            users.forEach(user => {
                list.innerHTML += `
                    <div class="user-card">
                        <div class="user-header">
                            <div><span class="user-name">${user.name}</span><span class="user-email">${user.email}</span></div>
                            <span class="status-badge ${user.status === 'Approved' ? 'status-active' : ''}">${user.status}</span>
                        </div>
                        <div class="tools-container">
                            ${tools.map((t, i) => `
                                <div class="tool-box"><span>${t}</span>
                                <input type="checkbox" class="toggle-switch" id="tool-${user._id}-${i}" 
                                ${user.permissions?.activeCheckers?.includes(t) ? 'checked' : ''}></div>
                            `).join('')}
                        </div>
                        <div class="grid-buttons">
                            <button class="master-btn btn-cyan" onclick="saveUser('${user._id}', 'Approved')">SAVE</button>
                            <button class="master-btn btn-red" onclick="saveUser('${user._id}', 'Blocked')">BLOCK</button>
                        </div>
                    </div>`;
            });
        }

        async function saveUser(userId, status) {
            const checkers = [];
            const labels = ['FB-Check', 'Pass-Pro', 'IP-Scan', 'Mail-Pro', 'Dev-Scanner', 'Link-Safe', 'User-Hunt', 'Firewall'];
            for(let i=0; i<8; i++) {
                const cb = document.getElementById(`tool-${userId}-${i}`);
                if(cb && cb.checked) checkers.push(labels[i]);
            }
            await fetch('/api/admin/manage-user', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ userId, status, checkers })
            });
            alert("ইউজার আপডেট সফল!");
            loadUsers();
        }

        window.onload = loadUsers;
    </script>
</body>
</html>
