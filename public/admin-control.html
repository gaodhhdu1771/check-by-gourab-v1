<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Admin V2 | Gourab Tech</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #0f141e;
            --card-bg: #1a202c;
            --accent-cyan: #00d2ff;
            --btn-green: #22c55e;
            --btn-red: #ef4444;
            --text-gray: #a0aec0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg-dark); color: white; padding: 20px; }

        .container { width: 100%; max-width: 600px; margin: auto; }
        h1 { text-align: center; color: var(--accent-cyan); font-size: 1.8rem; margin: 20px 0; text-transform: uppercase; letter-spacing: 2px; }

        /* প্রধান কার্ড স্টাইল (আপনার ২য় ছবির মতো) */
        .control-card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.05);
        }

        .card-header {
            color: var(--accent-cyan);
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* বাটন স্টাইল */
        .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .btn {
            padding: 15px;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            color: white;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-on { background: var(--btn-green); }
        .btn-off { background: var(--btn-red); }
        .btn-update { 
            background: linear-gradient(90deg, #00d2ff, #3a7bd5); 
            width: 100%; margin-top: 15px; 
        }

        /* ইনপুট বক্স */
        input[type="text"] {
            width: 100%;
            padding: 15px;
            background: #0b0f16;
            border: 1px solid #2d3748;
            border-radius: 12px;
            color: white;
            font-size: 1rem;
        }

        /* ইউজার কন্ট্রোল সেকশন (নিচে থাকবে) */
        .user-section-title { margin-top: 40px; margin-bottom: 20px; color: var(--accent-cyan); }
        
        .user-card {
            background: #161b26;
            border: 1px solid var(--accent-cyan);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .checker-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin: 15px 0;
        }

        .checker-item {
            background: #0f141e;
            padding: 12px;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.9rem;
        }

        input[type="checkbox"] { width: 20px; height: 20px; accent-color: var(--accent-cyan); }

        @media (max-width: 480px) { .checker-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div class="container">
        <h1>MASTER ADMIN V2</h1>

        <div class="control-card">
            <div class="card-header"><i class="fas fa-power-off"></i> System Status</div>
            <div class="btn-row">
                <button class="btn btn-on" onclick="updateGlobal({isSiteActive: true})"><i class="fas fa-check-circle"></i> SITE ON</button>
                <button class="btn btn-off" onclick="updateGlobal({isSiteActive: false})"><i class="fas fa-times-circle"></i> SITE OFF</button>
            </div>
        </div>

        <div class="control-card">
            <div class="card-header"><i class="fas fa-crown"></i> Premium Access</div>
            <div class="btn-row">
                <button class="btn btn-on" onclick="updateGlobal({isPremiumMode: true})">ENABLE PRO</button>
                <button class="btn btn-off" onclick="updateGlobal({isPremiumMode: false})">DISABLE PRO</button>
            </div>
        </div>

        <div class="control-card">
            <div class="card-header"><i class="fas fa-money-bill-wave"></i> Payment & Price Control</div>
            <input type="text" id="pPrice" placeholder="টাকার পরিমাণ লিখুন...">
            <button class="btn btn-update" onclick="savePayment()">Update Price Info</button>
        </div>

        <h2 class="user-section-title"><i class="fas fa-users-cog"></i> User Custom Control</h2>
        
        <div id="userContainer">
            <p style="text-align:center; opacity:0.5;">ডাটা লোড হচ্ছে...</p>
        </div>
    </div>

    <script>
        async function updateGlobal(data) {
            await fetch('/api/admin/update-settings', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });
            alert("সফলভাবে আপডেট হয়েছে!");
        }

        async function fetchUsers() {
            const res = await fetch('/api/admin/users');
            const users = await res.json();
            const container = document.getElementById('userContainer');
            container.innerHTML = '';

            users.forEach(user => {
                const tools = ['FB-Check', 'Pass-Pro', 'IP-Scan', 'Mail-Pro', 'Dev-Scanner', 'Link-Safe', 'User-Hunt', 'Firewall'];
                container.innerHTML += `
                    <div class="user-card">
                        <div style="font-weight:700; border-bottom:1px solid #2d3748; padding-bottom:10px; margin-bottom:10px;">
                            ${user.name} (${user.email})
                        </div>
                        <div class="checker-grid">
                            ${tools.map((tool, i) => `
                                <div class="checker-item">
                                    <label>${tool}</label>
                                    <input type="checkbox" id="tool-${user._id}-${i}" ${user.permissions?.activeCheckers?.includes(tool) ? 'checked' : ''}>
                                </div>
                            `).join('')}
                        </div>
                        <div class="btn-row">
                            <button class="btn btn-on" style="font-size:0.8rem;" onclick="manageUser('${user._id}', 'Approved')">Save Permissions</button>
                            <button class="btn btn-off" style="font-size:0.8rem;" onclick="manageUser('${user._id}', 'Blocked')">Block User</button>
                        </div>
                    </div>
                `;
            });
        }

        async function manageUser(userId, status) {
            const checkers = [];
            const labels = ['FB-Check', 'Pass-Pro', 'IP-Scan', 'Mail-Pro', 'Dev-Scanner', 'Link-Safe', 'User-Hunt', 'Firewall'];
            for(let i=0; i<8; i++) {
                if(document.getElementById(`tool-${userId}-${i}`).checked) checkers.push(labels[i]);
            }
            await fetch('/api/admin/manage-user', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ userId, status, checkers })
            });
            alert("ইউজার পারমিশন সেভ হয়েছে!");
            fetchUsers();
        }

        window.onload = fetchUsers;
    </script>
</body>
</html>
