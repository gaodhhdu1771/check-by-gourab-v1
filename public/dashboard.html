<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Gourab Core-V1</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* তোমার আগের সব স্টাইল এখানে হুবহু থাকবে */
        :root {
            --bg-dark: #080b12;
            --accent-cyan: #00d2ff;
            --btn-green: #00ff88;
            --btn-red: #ff3366;
            --neon-glow: 0 0 15px rgba(0, 210, 255, 0.4);
            --primary-gradient: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
        }
        body {
            background: var(--primary-gradient);
            color: #fff;
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
        }
        /* ... তোমার বাকি সব CSS ... */
        .navbar { background: rgba(0,0,0,0.6); backdrop-filter: blur(15px); border-bottom: 1px solid rgba(255,255,255,0.1); }
        .nav-logo { font-size: 1.4rem; font-weight: 800; color: var(--accent-cyan); text-shadow: var(--neon-glow); }
        .tool-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px; padding: 20px 10px; transition: 0.3s; text-align: center; cursor: pointer; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 5px; }
        .dot-active { background: var(--btn-green); box-shadow: 0 0 8px var(--btn-green); }
        .dot-off { background: var(--btn-red); box-shadow: 0 0 8px var(--btn-red); }
    </style>
</head>
<body>

    <nav class="navbar navbar-dark sticky-top">
        <div class="container-fluid">
            <button class="navbar-toggler border-0" type="button" data-bs-toggle="offcanvas" data-bs-target="#sidebar">
                <i class="fas fa-bars text-white fs-3"></i>
            </button>
            <span class="nav-logo">GOURAB <span style="color: #fff;">CORE-V1</span></span>
        </div>
    </nav>

    <div class="offcanvas offcanvas-start" id="sidebar">
        <div class="offcanvas-header border-bottom border-secondary">
            <h5 class="offcanvas-title text-info fw-bold">MASTER MENU</h5>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas"></button>
        </div>
        <div class="offcanvas-body p-0" id="sidebarItems"></div>
        <div class="p-3 border-top border-secondary">
            <button onclick="logout()" class="btn btn-outline-danger w-100 rounded-pill">Logout</button>
        </div>
    </div>

    <div class="hero-section text-center p-4">
        <h1 class="welcome-msg" id="welcomeText" style="font-size: 2rem; font-weight: 900; background: linear-gradient(to right, #00d2ff, #92fe9d); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">লোড হচ্ছে...</h1>
        <p class="opacity-75">আপনার জন্য নির্ধারিত টুলসগুলো নিচে দেওয়া হলো।</p>
    </div>

    <div class="container pb-5">
        <div class="row g-3" id="checkersContainer"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        async function initDashboard() {
            const userId = localStorage.getItem('userId');
            if (!userId) { window.location.href = '/login.html'; return; }

            try {
                // তোমার নতুন সার্ভার এপিআই কল
                const res = await fetch('/api/user/me', {
                    headers: { 'user-id': userId }
                });
                
                if (!res.ok) {
                    const errorData = await res.json();
                    if (res.status === 403) alert(errorData.error);
                    window.location.href = '/login.html';
                    return;
                }

                const user = await res.json();
                document.getElementById('welcomeText').innerText = `Hello, ${user.name}!`;

                // ডাটাবেজ থেকে অনুমোদিত টুলসের লিস্ট
                const activeTools = user.permissions || [];
                
                // তোমার গিটহাবের ৮টি টুলের সঠিক প্রোফাইল
                const fullToolsList = [
                    { id: '2fa-slit', name: '2FA Slit', icon: 'fas fa-key' },
                    { id: 'data-reporter', name: 'Data Reporter', icon: 'fas fa-file-medical-alt' },
                    { id: 'fb-check', name: 'FB Check PRO', icon: 'fab fa-facebook-square' },
                    { id: 'geo-sync', name: 'Geo-Sync Gen', icon: 'fas fa-id-card' },
                    { id: 'mail-validator', name: 'Mail Validator', icon: 'fas fa-envelope-open-text' },
                    { id: 'network-trace', name: 'Network Trace', icon: 'fas fa-network-wired' },
                    { id: 'tg-slit', name: 'TG Slit', icon: 'fab fa-telegram-plane' },
                    { id: 'time-smary', name: 'Time Summary', icon: 'fas fa-history' }
                ];

                const container = document.getElementById('checkersContainer');
                const sidebar = document.getElementById('sidebarItems');
                container.innerHTML = '';
                sidebar.innerHTML = '';

                fullToolsList.forEach(tool => {
                    // অ্যাডমিন যদি পারমিশন দেয় অথবা ইউজার নিজেই অ্যাডমিন হয়
                    const isLive = activeTools.includes(tool.id) || user.role === 'admin';
                    
                    // ড্যাশবোর্ড কার্ড রেন্ডার
                    container.innerHTML += `
                        <div class="col-6 col-md-3">
                            <div class="tool-card shadow-sm" onclick="handleToolClick('${tool.id}', ${isLive}, '${tool.name}')">
                                <div class="tool-icon" style="font-size: 2.5rem; color: #00d2ff; margin-bottom: 12px;"><i class="${tool.icon}"></i></div>
                                <div class="tool-name" style="font-size: 0.9rem; font-weight: 700;">${tool.name}</div>
                                <div style="font-size: 0.65rem;">
                                    <span class="status-dot ${isLive ? 'dot-active' : 'dot-off'}"></span>
                                    <span class="${isLive ? 'text-success' : 'text-danger'}">${isLive ? 'Active' : 'Locked'}</span>
                                </div>
                            </div>
                        </div>`;
                    
                    // সাইডবার আপডেট
                    sidebar.innerHTML += `
                        <a href="#" class="menu-item" onclick="handleToolClick('${tool.id}', ${isLive}, '${tool.name}')" style="padding: 15px 20px; color: #fff; text-decoration: none; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid rgba(255,255,255,0.05);">
                            <i class="${tool.icon} ${isLive ? 'text-info' : 'text-secondary'}"></i> ${tool.name}
                        </a>`;
                });

            } catch (err) { 
                console.error("Dashboard Error:", err);
            }
        }

        function handleToolClick(id, isLive, name) {
            if (isLive) {
                window.location.href = `/tools/${id}.html`;
            } else {
                alert(`দুঃখিত! ${name} টুলটি আপনার জন্য লক করা। অ্যাডমিনের সাথে যোগাযোগ করুন।`);
            }
        }

        function logout() {
            localStorage.clear();
            window.location.href = '/login.html';
        }

        window.onload = initDashboard;
    </script>
</body>
</html>
