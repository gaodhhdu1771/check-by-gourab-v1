<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | My Tools Panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: #fff;
            min-height: 100vh;
            font-family: 'Segoe UI', sans-serif;
            scroll-behavior: smooth;
        }
        .offcanvas {
            background: rgba(15, 12, 41, 0.95) !important;
            backdrop-filter: blur(15px);
            border-right: 1px solid rgba(0, 210, 255, 0.3);
        }
        .menu-item {
            padding: 12px 20px;
            display: flex;
            align-items: center;
            color: #ddd;
            text-decoration: none;
            transition: 0.3s;
            border-radius: 8px;
            margin: 5px 10px;
        }
        .menu-item:hover { background: rgba(0, 210, 255, 0.1); color: #00d2ff; }
        .home-section { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .custom-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 25px;
            transition: 0.3s;
            text-align: center;
            cursor: pointer;
        }
        .custom-card:hover { border: 1px solid #00d2ff; transform: translateY(-5px); }
        .slot-name { color: #00d2ff; font-weight: bold; margin-top: 10px; text-transform: uppercase; font-size: 0.8rem; }
    </style>
</head>
<body>

    <nav class="navbar navbar-dark sticky-top" style="background: rgba(0,0,0,0.5); backdrop-filter: blur(10px);">
        <div class="container-fluid">
            <button class="navbar-toggler border-0" type="button" data-bs-toggle="offcanvas" data-bs-target="#sidebarMenu">
                <i class="fas fa-bars text-white fs-3"></i>
            </button>
            <span class="navbar-brand fw-bold">My <span style="color: #00d2ff;">Panel-v1</span></span>
        </div>
    </nav>

    <div class="offcanvas offcanvas-start" tabindex="-1" id="sidebarMenu">
        <div class="offcanvas-header">
            <h5 class="offcanvas-title fw-bold" style="color: #00d2ff;">Menu Options</h5>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas"></button>
        </div>
        <div class="offcanvas-body p-0">
            <div class="p-3 text-uppercase small opacity-50">Manage Tools</div>
            <a href="#" class="menu-item" onclick="loadTool('gmail')"><i class="fas fa-envelope"></i> My Tool 1</a>
            <a href="#" class="menu-item" onclick="loadTool('ip')"><i class="fas fa-network-wired"></i> My Tool 2</a>
            <a href="#" class="menu-item" onclick="loadTool('fb')"><i class="fab fa-facebook"></i> My Tool 3</a>
            <a href="#" class="menu-item" onclick="loadTool('tg')"><i class="fab fa-telegram"></i> My Tool 4</a>
            <a href="#" class="menu-item" onclick="loadTool('2fa')"><i class="fas fa-key"></i> My Tool 5</a>
            <a href="#" class="menu-item" onclick="loadTool('report')"><i class="fas fa-file-invoice"></i> My Tool 6</a>
            <a href="#" class="menu-item" onclick="loadTool('timezone')"><i class="fas fa-clock"></i> My Tool 7</a>
            <a href="#" class="menu-item" onclick="loadTool('generator')"><i class="fas fa-random"></i> My Tool 8</a>
        </div>
    </div>

    <div class="home-section">
        <h1 style="font-size: 3rem; font-weight: 800; background: linear-gradient(to right, #00d2ff, #92fe9d); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Welcome to My Panel</h1>
        <p class="opacity-75 mb-4">আপনার টুলসগুলো অ্যাক্সেস করতে নিচের বাটনে ক্লিক করুন।</p>
        <a href="#tool-grid" class="btn btn-primary rounded-pill px-5 py-3 fw-bold shadow-lg" style="background: linear-gradient(45deg, #00d2ff, #3a7bd5); border:none;">প্রধান মেনু</a>
    </div>

    <div id="tool-grid" class="container py-5">
        <div class="row g-4 text-center">
            <div class="col-6 col-md-3" onclick="loadTool('gmail')"><div class="custom-card"><i class="fas fa-envelope fa-2x"></i><div class="slot-name">My Tool 1</div></div></div>
            <div class="col-6 col-md-3" onclick="loadTool('ip')"><div class="custom-card"><i class="fas fa-network-wired fa-2x"></i><div class="slot-name">My Tool 2</div></div></div>
            <div class="col-6 col-md-3" onclick="loadTool('fb')"><div class="custom-card"><i class="fab fa-facebook fa-2x"></i><div class="slot-name">My Tool 3</div></div></div>
            <div class="col-6 col-md-3" onclick="loadTool('tg')"><div class="custom-card"><i class="fab fa-telegram fa-2x"></i><div class="slot-name">My Tool 4</div></div></div>
            <div class="col-6 col-md-3" onclick="loadTool('2fa')"><div class="custom-card"><i class="fas fa-key fa-2x"></i><div class="slot-name">My Tool 5</div></div></div>
            <div class="col-6 col-md-3" onclick="loadTool('report')"><div class="custom-card"><i class="fas fa-file-invoice fa-2x"></i><div class="slot-name">My Tool 6</div></div></div>
            <div class="col-6 col-md-3" onclick="loadTool('timezone')"><div class="custom-card"><i class="fas fa-clock fa-2x"></i><div class="slot-name">My Tool 7</div></div></div>
            <div class="col-6 col-md-3" onclick="loadTool('generator')"><div class="custom-card"><i class="fas fa-random fa-2x"></i><div class="slot-name">My Tool 8</div></div></div>
        </div>
    </div>

    <script src="js/checkers.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
