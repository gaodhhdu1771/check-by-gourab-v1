<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Check by Gourab-v1</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            --accent-color: #00d2ff;
        }
        body {
            background: var(--primary-gradient);
            color: #fff;
            min-height: 100vh;
            font-family: 'Segoe UI', sans-serif;
            overflow-x: hidden;
        }
        /* সুপারফাস্ট লোডিং এনিমেশন */
        .fade-in { animation: fadeIn 0.5s ease-in; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .navbar { background: rgba(0,0,0,0.5); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.1); }
        
        .offcanvas { background: rgba(15, 12, 41, 0.98) !important; backdrop-filter: blur(15px); }

        .home-section { 
            height: 70vh; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            text-align: center;
            padding: 20px;
        }

        .custom-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 25px;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-align: center;
            cursor: pointer;
            height: 100%;
        }
        .custom-card:hover { 
            border: 1px solid var(--accent-color); 
            transform: translateY(-8px);
            box-shadow: 0 10px 20px rgba(0, 210, 255, 0.2);
        }
        .slot-name { color: var(--accent-color); font-weight: bold; margin-top: 15px; text-transform: uppercase; font-size: 0.85rem; letter-spacing: 1px; }
        .hidden-checker { display: none; }
    </style>
</head>
<body class="fade-in">

    <nav class="navbar navbar-dark sticky-top">
        <div class="container-fluid">
            <button class="navbar-toggler border-0" type="button" data-bs-toggle="offcanvas" data-bs-target="#sidebarMenu">
                <i class="fas fa-bars text-white fs-3"></i>
            </button>
            <span class="navbar-brand fw-bold">Gourab <span style="color: var(--accent-color);">Panel-v1</span></span>
            <div class="dropdown">
                <i class="fas fa-user-circle fs-3 text-white cursor-pointer" id="userMenu" data-bs-toggle="dropdown"></i>
                <ul class="dropdown-menu dropdown-menu-end bg-dark border-secondary">
                    <li><a class="dropdown-item text-white" href="#" onclick="logout()">Logout</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="offcanvas offcanvas-start" tabindex="-1" id="sidebarMenu">
        <div class="offcanvas-header">
            <h5 class="offcanvas-title fw-bold" style="color: var(--accent-color);">Menu Options</h5>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas"></button>
        </div>
        <div class="offcanvas-body p-0" id="sidebarItems">
            </div>
    </div>

    <div class="home-section">
        <h1 id="welcomeText" style="font-size: 2.8rem; font-weight: 800; background: linear-gradient(to right, #00d2ff, #92fe9d); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Loading Welcome Message...</h1>
        <p class="opacity-75 mb-4">আপনার টুলসগুলো নিচে দেওয়া হলো। নির্ভুলভাবে সব রিপোর্ট চেক করুন।</p>
        <a href="#tool-grid" class="btn btn-primary rounded-pill px-5 py-3 fw-bold shadow-lg" style="background: linear-gradient(45deg, #00d2ff, #3a7bd5); border:none;">Explore Tools</a>
    </div>

    <div id="tool-grid" class="container py-5">
        <div class="row g-4 text-center" id="checkersContainer">
            </div>
    </div>

    <script>
        // সেটিংস এবং ইউজার পারমিশন লোড করার ফাংশন
        async function initDashboard() {
            try {
                // এখানে ব্যাকএন্ড থেকে সেটিংস আনতে হবে
                const response = await fetch('/api/admin/get-settings'); // এই এপিআই server.js এ যোগ করতে হবে
                const settings = await response.json();

                // ১. ওয়েলকাম মেসেজ সেট করা
                document.getElementById('welcomeText').innerText = settings.loginWelcomeMessage || "Welcome to My Panel";

                // ২. চেকারগুলো লোড করা (শুধুমাত্র যেগুলো Active)
                const container = document.getElementById('checkersContainer');
                const sidebar = document.getElementById('sidebarItems');
                
                const checkers = [
                    { id: 'gmail', name: 'Gmail Slit', icon: 'fas fa-envelope' },
                    { id: 'ip', name: 'IP Slit', icon: 'fas fa-network-wired' },
                    { id: 'fb', name: 'Facebook Slit', icon: 'fab fa-facebook' },
                    { id: 'tg', name: 'TG Slit', icon: 'fab fa-telegram' },
                    { id: '2fa', name: '2FA Slit', icon: 'fas fa-key' },
                    { id: 'report', name: 'Report Slot', icon: 'fas fa-file-invoice' },
                    { id: 'timezone', name: 'Timezone Finder', icon: 'fas fa-clock' },
                    { id: 'generator', name: 'Recovery Gen', icon: 'fas fa-random' }
                ];

                container.innerHTML = '';
                checkers.forEach((tool, index) => {
                    // অ্যাডমিন যদি নির্দিষ্ট চেকার বন্ধ করে রাখে তবে সেটি দেখাবে না
                    if (settings.activeCheckers && !settings.activeCheckers.includes(`checker${index+1}`)) return;

                    // কার্ড তৈরি
                    container.innerHTML += `
                        <div class="col-6 col-md-3">
                            <div class="custom-card" onclick="loadTool('${tool.id}')">
                                <i class="${tool.icon} fa-2x"></i>
                                <div class="slot-name">${tool.name}</div>
                            </div>
                        </div>
                    `;

                    // সাইডবার আইটেম তৈরি
                    sidebar.innerHTML += `
                        <a href="#" class="menu-item text-decoration-none p-3 d-block text-white border-bottom border-secondary" onclick="loadTool('${tool.id}')">
                            <i class="${tool.icon} me-2"></i> ${tool.name}
                        </a>
                    `;
                });

            } catch (err) {
                console.log("Error loading settings:", err);
            }
        }

        function loadTool(toolId) {
            // আপনার checkers.js থেকে টুল লোড হবে
            console.log("Loading tool:", toolId);
            window.location.href = `/tools/${toolId}.html`; 
        }

        function logout() {
            localStorage.clear();
            window.location.href = '/login.html';
        }

        // পেজ লোড হলে রান হবে
        window.onload = initDashboard;
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
