<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Gourab Tech</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #080b12;
            --card-bg: rgba(255, 255, 255, 0.04);
            --accent-cyan: #00d2ff;
            --neon-glow: 0 0 15px rgba(0, 210, 255, 0.4);
        }
        body {
            background-color: var(--bg-dark);
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            overflow-x: hidden;
        }
        /* এনিমেশন */
        .fade-up { animation: fadeUp 0.8s ease-out; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        /* নেভিগেশন */
        .navbar { background: rgba(0,0,0,0.7); backdrop-filter: blur(15px); border-bottom: 1px solid rgba(255,255,255,0.05); }
        .nav-logo { font-size: 1.5rem; font-weight: 800; color: var(--accent-cyan); text-shadow: var(--neon-glow); }

        /* হিরো সেকশন */
        .hero-section {
            padding: 80px 20px;
            text-align: center;
            background: radial-gradient(circle at top, rgba(0, 210, 255, 0.1) 0%, transparent 70%);
        }
        .welcome-msg { font-size: 2.5rem; font-weight: 900; background: linear-gradient(to right, #00d2ff, #92fe9d); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 10px; }

        /* টুল কার্ড ডিজাইন */
        .tool-card {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 30px 15px;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            height: 100%;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }
        .tool-card::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(45deg, transparent, rgba(0, 210, 255, 0.05), transparent);
            transform: translateX(-100%); transition: 0.6s;
        }
        .tool-card:hover::before { transform: translateX(100%); }
        .tool-card:hover { border-color: var(--accent-cyan); transform: scale(1.05); box-shadow: var(--neon-glow); }
        
        .tool-icon { font-size: 2.5rem; color: var(--accent-cyan); margin-bottom: 15px; }
        .tool-name { font-weight: 700; font-size: 1rem; text-transform: uppercase; letter-spacing: 1px; color: #fff; }
        .tool-desc { font-size: 0.75rem; color: #888; margin-top: 8px; line-height: 1.4; }

        /* সাইডবার */
        .offcanvas { background: #0a0e17 !important; border-right: 1px solid var(--accent-cyan); }
        .menu-item { padding: 15px 25px; color: #fff; text-decoration: none; display: flex; align-items: center; gap: 15px; transition: 0.3s; }
        .menu-item:hover { background: rgba(0, 210, 255, 0.1); color: var(--accent-cyan); }

        @media (max-width: 500px) { .welcome-msg { font-size: 1.8rem; } }
    </style>
</head>
<body class="fade-up">

    <nav class="navbar navbar-dark sticky-top">
        <div class="container-fluid">
            <button class="navbar-toggler border-0" type="button" data-bs-toggle="offcanvas" data-bs-target="#sidebar">
                <i class="fas fa-align-left fs-3"></i>
            </button>
            <span class="nav-logo">GOURAB <span style="color: #fff;">TECH</span></span>
            <div class="dropdown">
                <img src="https://ui-avatars.com/api/?name=G&background=00d2ff&color=fff" class="rounded-circle border border-info" width="35" data-bs-toggle="dropdown" style="cursor: pointer;">
                <ul class="dropdown-menu dropdown-menu-end bg-dark border-secondary mt-2">
                    <li><a class="dropdown-item text-white" href="#" onclick="logout()"><i class="fas fa-sign-out-alt me-2"></i>Logout</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="offcanvas offcanvas-start" id="sidebar">
        <div class="offcanvas-header border-bottom border-secondary">
            <h5 class="offcanvas-title text-info fw-bold">MENU OPTIONS</h5>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas"></button>
        </div>
        <div class="offcanvas-body p-0" id="sidebarItems"></div>
    </div>

    <div class="hero-section">
        <h1 class="welcome-msg" id="welcomeText">Loading...</h1>
        <p class="text-secondary">নিচে আপনার অনুমোদিত টুলসগুলো দেওয়া হলো।</p>
    </div>

    <div class="container pb-5">
        <div class="row g-4" id="checkersContainer">
            </div>
    </div>

    <script>
        async function initDashboard() {
            try {
                // ১. সেটিংস এবং ইউজারের নিজস্ব পারমিশন আনা
                const response = await fetch('/api/user/me'); // এটি আপনার প্রোফাইল এপিআই
                const user = await response.json();
                
                const settingsRes = await fetch('/api/admin/get-settings');
                const settings = await settingsRes.json();

                document.getElementById('welcomeText').innerText = settings.loginWelcomeMessage || "Welcome Gourab";

                const container = document.getElementById('checkersContainer');
                const sidebar = document.getElementById('sidebarItems');

                // আপনার ৮টি মেইন চেকার টুলস
                const allTools = [
                    { id: 'fb', name: 'FB-Pro Check', icon: 'fab fa-facebook', desc: 'অ্যাকাউন্টের তথ্য ও স্ট্যাটাস চেক' },
                    { id: 'pass', name: 'Pass-Strength', icon: 'fas fa-shield-virus', desc: 'পাসওয়ার্ড সুরক্ষা যাচাইকরণ' },
                    { id: 'ip', name: 'IP-Tracker', icon: 'fas fa-map-marker-alt', desc: 'আইপি লোকেশন ও নেটওয়ার্ক স্ক্যান' },
                    { id: 'mail', name: 'Mail-Pro', icon: 'fas fa-envelope-open-text', desc: 'ইমেইল ব্রিচ ও ভ্যালিডেশন চেক' },
                    { id: 'dev', name: 'Dev-Scanner', icon: 'fas fa-code-branch', desc: 'সিকিউরিটি ও ডেভেলপার মোড স্ক্যান' },
                    { id: 'link', name: 'Link-Safe', icon: 'fas fa-link', desc: 'ম্যালওয়্যার ও ফিশিং লিংক চেক' },
                    { id: 'hunt', name: 'User-Hunt', icon: 'fas fa-search-dollar', desc: 'ইউজার অ্যাক্টিভিটি ট্র্যাকিং' },
                    { id: 'firewall', name: 'Firewall', icon: 'fas fa-user-shield', desc: 'সার্ভার ও সাইট সিকিউরিটি লেয়ার' }
                ];

                container.innerHTML = '';
                // ইউজার যদি 'Approved' থাকে তবেই চেকার দেখাবে
                if(user.status === 'Approved') {
                    allTools.forEach((tool, index) => {
                        // অ্যাডমিন প্যানেল থেকে এই ইউজারের জন্য যেটি টিক দেওয়া শুধু সেটি শো করবে
                        if (user.permissions && user.permissions.activeCheckers.includes(tool.name)) {
                            
                            // কার্ড অ্যাড
                            container.innerHTML += `
                                <div class="col-6 col-md-3">
                                    <div class="tool-card" onclick="loadTool('${tool.id}')">
                                        <div class="tool-icon"><i class="${tool.icon}"></i></div>
                                        <div class="tool-name">${tool.name}</div>
                                        <div class="tool-desc">${tool.desc}</div>
                                    </div>
                                </div>
                            `;

                            // সাইডবার অ্যাড
                            sidebar.innerHTML += `
                                <a href="#" class="menu-item border-bottom border-dark" onclick="loadTool('${tool.id}')">
                                    <i class="${tool.icon}"></i> ${tool.name}
                                </a>
                            `;
                        }
                    });
                } else {
                    container.innerHTML = `<div class="col-12 text-center text-danger">আপনার অ্যাকাউন্টটি অনুমোদিত নয়। দয়া করে অ্যাডমিনের সাথে যোগাযোগ করুন।</div>`;
                }

            } catch (err) {
                console.error("Dashboard error:", err);
            }
        }

        function loadTool(id) { window.location.href = `/tools/${id}.html`; }
        function logout() { localStorage.clear(); window.location.href = '/login.html'; }

        window.onload = initDashboard;
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
