<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Check by Gourab-v1</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --accent: #00d2ff;
            --bg-dark: #0f0c29;
            --glass: rgba(255, 255, 255, 0.05);
        }

        /* থিম কন্ট্রোল - অ্যাডমিন থেকে যা আসবে */
        body.dark-ocean { background: radial-gradient(circle, #1a1f35, #070b14); --accent: #00f2ff; }
        body.neon-night { background: radial-gradient(circle, #2b0035, #0a0014); --accent: #ff00ff; }
        body.gold-luxury { background: radial-gradient(circle, #2c1e01, #000000); --accent: #ffcc00; }
        body.cyber-punk { background: #000; --accent: #39ff14; }

        body { 
            height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
            margin: 0;
            transition: 0.5s;
        }

        .auth-card { 
            background: var(--glass); 
            backdrop-filter: blur(20px); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 30px; 
            padding: 40px; 
            width: 90%; 
            max-width: 420px; 
            text-align: center;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            animation: slideUp 0.8s ease-out;
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }

        .logo-area i { font-size: 3.5rem; color: var(--accent); margin-bottom: 10px; filter: drop-shadow(0 0 10px var(--accent)); }
        
        .input-group { position: relative; margin-bottom: 20px; }
        .input-group i { position: absolute; left: 18px; top: 15px; color: var(--accent); z-index: 10; }
        
        .form-control { 
            background: rgba(255, 255, 255, 0.06) !important; 
            border: 1px solid rgba(255, 255, 255, 0.1) !important; 
            border-radius: 15px !important; 
            padding: 14px 14px 14px 50px !important; 
            color: #fff !important; 
        }

        .form-control:focus { border-color: var(--accent) !important; box-shadow: 0 0 15px var(--accent); }

        .btn-auth { 
            background: var(--accent); 
            border: none; 
            border-radius: 15px; 
            padding: 14px; 
            width: 100%; 
            color: #000; 
            font-weight: 800; 
            text-transform: uppercase;
            box-shadow: 0 5px 15px var(--accent);
            transition: 0.3s;
        }

        .btn-auth:hover { transform: translateY(-3px); opacity: 0.9; }
        
        #dynamicMsg { color: #ccc; margin-bottom: 25px; font-size: 0.9rem; font-weight: 300; }
    </style>
</head>
<body class="dark-ocean" id="bodyTheme">
    <div class="auth-card">
        <div class="logo-area"><i class="fas fa-fingerprint"></i></div>
        <h2 style="color: #fff; font-weight: 800; letter-spacing: 2px;">LOGIN</h2>
        <p id="dynamicMsg">প্যানেলে প্রবেশের জন্য আপনার তথ্য দিন</p>
        
        <form id="loginForm">
            <div class="input-group">
                <i class="fas fa-envelope"></i>
                <input type="email" id="email" class="form-control" placeholder="ইমেইল অ্যাড্রেস" required>
            </div>
            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input type="password" id="password" class="form-control" placeholder="পাসওয়ার্ড" required>
            </div>
            <button type="submit" class="btn-auth" id="loginBtn">প্রবেশ করুন</button>
        </form>
        
        <div style="margin-top: 25px; font-size: 0.85rem; color: #aaa;">
            নতুন ইউজার? <a href="register.html" style="color: var(--accent); text-decoration: none; font-weight: bold;">একাউন্ট খুলুন</a>
        </div>
    </div>

    <script>
        // ১. অ্যাডমিন সেটিংস ও থিম লোড করা
        window.onload = async () => {
            try {
                const res = await fetch('/api/admin/get-settings');
                const settings = await res.json();
                
                // যদি সাইট বন্ধ থাকে তবে রিডাইরেক্ট করবে
                if (settings.isSiteActive === false) {
                    document.body.innerHTML = "<h1 style='color:white; text-align:center; margin-top:20%;'>Site is under maintenance.</h1>";
                    return;
                }

                // থিম সেট করা
                if(settings.themeConfig?.loginTheme) {
                    document.getElementById('bodyTheme').className = settings.themeConfig.loginTheme;
                }
            } catch (err) { console.log("Settings load failed"); }
        };

        // ২. লগইন প্রসেস
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const loginBtn = document.getElementById('loginBtn');
            loginBtn.innerText = "যাচাই করা হচ্ছে...";
            loginBtn.disabled = true;

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                
                const data = await res.json();
                
                if (res.ok) {
                    // সফল হলে ইউজার আইডি সেভ করে ড্যাশবোর্ডে পাঠানো
                    localStorage.setItem('userId', data.userId);
                    localStorage.setItem('role', data.role);
                    window.location.href = data.redirect; // অ্যাডমিন হলে অ্যাডমিন প্যানেল, ইউজার হলে ড্যাশবোর্ড
                } else {
                    alert(data.error || "ভুল ইমেইল বা পাসওয়ার্ড!");
                    loginBtn.innerText = "প্রবেশ করুন";
                    loginBtn.disabled = false;
                }
            } catch (err) {
                alert("সার্ভার কানেকশন এরর!");
                loginBtn.innerText = "প্রবেশ করুন";
                loginBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
