<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Secure Panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: linear-gradient(135deg, #0f0c29, #302b63, #24243e); height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Segoe UI', sans-serif; }
        .auth-card { background: rgba(255, 255, 255, 0.07); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 25px; padding: 40px; width: 100%; max-width: 400px; text-align: center; }
        .input-group { position: relative; margin-bottom: 20px; }
        .input-group i { position: absolute; left: 15px; top: 15px; color: #00d2ff; z-index: 10; }
        .form-control { background: rgba(255, 255, 255, 0.05) !important; border: 1px solid rgba(255, 255, 255, 0.1) !important; border-radius: 12px !important; padding: 12px 45px !important; color: #fff !important; }
        .toggle-password { position: absolute; right: 15px; top: 15px; cursor: pointer; color: #aaa; z-index: 10; }
        .btn-auth { background: linear-gradient(45deg, #00d2ff, #3a7bd5); border: none; border-radius: 12px; padding: 12px; width: 100%; color: #fff; font-weight: bold; }
    </style>
</head>
<body>
    <div class="auth-card">
        <h2 style="color: #00d2ff;">LOGIN</h2>
        <p style="color: #ccc;">আমাদের প্যানেলে আপনাকে স্বাগতম</p>
        <form id="loginForm">
            <div class="input-group">
                <i class="fas fa-user"></i>
                <input type="text" class="form-control" placeholder="ইউজারনেম দিন" required>
            </div>
            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input type="password" id="password" class="form-control" placeholder="পাসওয়ার্ড দিন" required>
                <span class="toggle-password" onclick="togglePass('password', 'eyeIcon')"><i class="fas fa-eye-slash" id="eyeIcon"></i></span>
            </div>
            <button type="submit" class="btn-auth">প্রবেশ করুন</button>
        </form>
        <div style="margin-top: 20px; font-size: 0.85rem;">অ্যাকাউন্ট নেই? <a href="register.html" style="color: #00d2ff; text-decoration: none;">রেজিস্ট্রেশন করুন</a></div>
    </div>
    <script>
        function togglePass(inputId, iconId) {
            const input = document.getElementById(inputId);
            const icon = document.getElementById(iconId);
            if (input.type === "password") { input.type = "text"; icon.classList.replace("fa-eye-slash", "fa-eye"); }
            else { input.type = "password"; icon.classList.replace("fa-eye", "fa-eye-slash"); }
        }
    </script>
</body>
</html>
