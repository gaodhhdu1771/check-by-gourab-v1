<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Pending | Gourab Panel</title>
    <style>
        body { background: #0f0c29; color: white; display: flex; align-items: center; justify-content: center; height: 100vh; font-family: sans-serif; text-align: center; padding: 20px; }
        .box { background: rgba(255,255,255,0.05); padding: 30px; border-radius: 20px; border: 1px solid #00d2ff; max-width: 500px; }
        h2 { color: #ffcc00; }
        p { line-height: 1.6; color: #ccc; }
        .warning { color: #ef4444; font-weight: bold; margin-top: 20px; border: 1px dashed red; padding: 10px; }
    </style>
</head>
<body>
    <div class="box">
        <i class="fas fa-clock" style="font-size: 50px; color: #00d2ff;"></i>
        <h2>অ্যাকাউন্টটি এখনো পেন্ডিং!</h2>
        <p>আপনার অ্যাকাউন্টটি সফলভাবে তৈরি হয়েছে, কিন্তু এটি ব্যবহারের জন্য অ্যাডমিনের অনুমতি প্রয়োজন।</p>
        
        <div class="warning">
            ওয়ার্নিং: সাইটে কোনো প্রকার অবৈধ কাজ বা হ্যাকিং এর চেষ্টা করবেন না। করলে আপনার আইপি সহ চিরতরে ব্লক করা হবে।
        </div>
        
        <p style="margin-top: 20px;">অনুমতির জন্য গৌরবের সাথে যোগাযোগ করুন।</p>
        <a href="login.html" style="color: #00d2ff; text-decoration: none;">লগইন পেজে ফিরুন</a>
    </div>
</body>
</html>
