<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Geo-Sync | Name & Recovery Gen</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body { background: #020617; font-family: 'Inter', sans-serif; }
    .glass { background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); }
    .badge { padding: 4px 10px; border-radius: 6px; font-weight: 800; font-size: 10px; text-transform: uppercase; }
    .bg-gen { background: #f0f9ff; color: #0369a1; border-left: 4px solid #0ea5e9; }
    .scan-row { border-bottom: 1px solid rgba(255,255,255,0.03); transition: 0.2s; }
    .scan-row:hover { background: rgba(14, 165, 233, 0.05); }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
  </style>
</head>
<body class="text-slate-300 min-h-screen p-4 md:p-10">

  <div class="max-w-6xl mx-auto">
    <div class="text-center mb-8">
      <h1 class="text-4xl font-black text-white italic tracking-tighter">GEO <span class="text-sky-500">SYNC</span></h1>
      <p class="text-slate-500 text-[10px] font-bold uppercase tracking-[0.4em]">Identity & Recovery Generator v1.0</p>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
      <div class="lg:col-span-5 space-y-4">
        <div class="glass rounded-[2rem] p-6 shadow-2xl">
          <div class="space-y-4">
            <div>
              <label class="text-[10px] font-bold text-slate-500 uppercase ml-2">How many items?</label>
              <input type="number" id="countInput" value="10" class="w-full mt-1 bg-slate-900 border border-slate-800 rounded-xl p-3 text-sky-400 outline-none focus:border-sky-500">
            </div>
            
            <div>
              <label class="text-[10px] font-bold text-slate-500 uppercase ml-2">Recovery Mail Domain</label>
              <select id="domainInput" class="w-full mt-1 bg-slate-900 border border-slate-800 rounded-xl p-3 text-sky-400 outline-none">
                <option value="@gmail.com">@gmail.com</option>
                <option value="@outlook.com">@outlook.com</option>
                <option value="@hotmail.com">@hotmail.com</option>
              </select>
            </div>
          </div>

          <button onclick="generateData()" class="w-full mt-6 bg-sky-500 hover:bg-sky-400 text-slate-900 font-black py-4 rounded-xl transition-all active:scale-95 flex items-center justify-center gap-2">
            <i class="fas fa-magic"></i> GENERATE DATA
          </button>

          <div class="grid grid-cols-1 gap-2 mt-4">
            <button onclick="copyGenerated()" class="bg-sky-500/10 hover:bg-sky-500/20 text-sky-400 border border-sky-500/20 py-3 rounded-xl text-[10px] font-black uppercase">
               <i class="fas fa-copy mr-1"></i> Copy All Generated Data
            </button>
            <button onclick="clearGenHistory()" class="text-slate-600 hover:text-red-400 text-[9px] font-bold uppercase mt-2 transition-colors">
                Clear Generated History
            </button>
          </div>
        </div>

        <div class="glass p-6 rounded-[2rem] border-b-2 border-sky-500 text-center">
          <p id="totalGen" class="text-3xl font-black text-sky-400">0</p>
          <p class="text-[9px] text-slate-500 font-bold uppercase tracking-widest mt-1">Total Identities Generated</p>
        </div>
      </div>

      <div class="lg:col-span-7">
        <div class="glass rounded-[2rem] overflow-hidden flex flex-col h-full min-h-[500px]">
          <div class="p-5 border-b border-slate-800 bg-slate-900/30 flex justify-between items-center">
            <h2 class="font-bold text-white text-xs uppercase tracking-widest text-sky-400">Generation Feed</h2>
            <span class="text-[9px] text-slate-600">Auto-saved to Database</span>
          </div>
          
          <div id="results" class="flex-1 overflow-y-auto">
             <div class="text-center py-24 opacity-10 italic">Press Generate to start...</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const firstNames = ["Arif", "Sabbir", "Gourab", "Tarikul", "Shaon", "Rakib", "Sumon", "Masud", "Niloy", "Rohan", "Siam", "Alif", "Joy", "Akash"];
    const lastNames = ["Hassan", "Islam", "Khan", "Ahmed", "Mollah", "Biswas", "Rana", "Sarker", "Chowdhury", "Talukder"];

    let genDb = JSON.parse(localStorage.getItem('geo_sync_db')) || [];

    // Load existing history on start
    window.onload = () => {
        updateStats();
        renderResults();
    };

    function generateData() {
        const count = parseInt(document.getElementById('countInput').value) || 10;
        const domain = document.getElementById('domainInput').value;
        const resultsDiv = document.getElementById('results');
        
        for (let i = 0; i < count; i++) {
            const fName = firstNames[Math.floor(Math.random() * firstNames.length)];
            const lName = lastNames[Math.floor(Math.random() * lastNames.length)];
            const fullName = `${fName} ${lName}`;
            const userPart = (fName + lName).toLowerCase() + Math.floor(1000 + Math.random() * 9000);
            const recoveryMail = userPart + domain;

            const newEntry = { name: fullName, email: recoveryMail };
            genDb.unshift(newEntry);
        }

        // Limit storage to last 100 items
        if(genDb.length > 100) genDb = genDb.slice(0, 100);

        localStorage.setItem('geo_sync_db', JSON.stringify(genDb));
        renderResults();
        updateStats();
    }

    function renderResults() {
        const resultsDiv = document.getElementById('results');
        if(genDb.length === 0) return;
        
        resultsDiv.innerHTML = genDb.map(item => `
            <div class="scan-row grid grid-cols-12 p-4 px-6 items-center">
                <div class="col-span-7 flex flex-col">
                    <span class="text-sm font-bold text-white">${item.name}</span>
                    <span class="text-[11px] font-mono text-slate-500">${item.email}</span>
                </div>
                <div class="col-span-5 text-right">
                    <span class="badge bg-gen">Identity Ready</span>
                </div>
            </div>
        `).join('');
    }

    function updateStats() {
        document.getElementById('totalGen').innerText = genDb.length;
    }

    function copyGenerated() {
        if(genDb.length === 0) return alert('No data to copy!');
        const text = genDb.map(item => `${item.name} | ${item.email}`).join('\n');
        navigator.clipboard.writeText(text).then(() => alert('Generated data copied!'));
    }

    function clearGenHistory() {
        if(confirm('সব জেনারেটেড ডাটা মুছে ফেলবেন?')) {
            genDb = [];
            localStorage.removeItem('geo_sync_db');
            location.reload();
        }
    }
  </script>
</body>
  </html>
