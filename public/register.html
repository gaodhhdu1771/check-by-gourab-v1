<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Register | Check by Gourab-v1</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --accent: #00d2ff;
            --bg-dark: #0f0c29;
            --glass: rgba(255, 255, 255, 0.05);
        }

        /* থিম কন্ট্রোল - লগইন পেজের সাথে মিল রেখে */
        body.dark-ocean { background: radial-gradient(circle, #1a1f35, #070b14); --accent: #00f2ff; }
        body.neon-night { background: radial-gradient(circle, #2b0035, #0a0014); --accent: #ff00ff; }
        body.gold-luxury { background: radial-gradient(circle, #2c1e01, #000000); --accent: #ffcc00; }
        body.cyber-punk { background: #000; --accent: #39ff14; }

        body { 
            height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
            margin: 0;
            transition: 0.5s;
        }

        .auth-card { 
            background: var(--glass); 
            backdrop-filter: blur(20px); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 30px; 
            padding: 35px; 
            width: 90%; 
            max-width: 420px; 
            text-align: center;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            animation: slideUp 0.8s ease-out;
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }

        .logo-area i { font-size: 3rem; color: var(--accent); margin-bottom: 10px; filter: drop-shadow(0 0 10px var(--accent)); }
        
        .input-group { position: relative; margin-bottom: 15px; }
        .input-group i { position: absolute; left: 18px; top: 15px; color: var(--accent); z-index: 10; }
        
        .form-control { 
            background: rgba(255, 255, 255, 0.06) !important; 
            border: 1px solid rgba(255, 255, 255, 0.1) !important; 
            border-radius: 15px !important; 
            padding: 14px 14px 14px 50px !important; 
            color: #fff !important; 
        }

        .form-control:focus { border-color: var(--accent) !important; box-shadow: 0 0 15px var(--accent); }

        .btn-auth { 
            background: var(--accent); 
            border: none; 
            border-radius: 15px; 
            padding: 14px; 
            width: 100%; 
            color: #000; 
            font-weight: 800; 
            text-transform: uppercase;
            box-shadow: 0 5px 15px var(--accent);
            transition: 0.3s;
            margin-top: 10px;
        }

        .btn-auth:hover { transform: translateY(-3px); opacity: 0.9; }
        
        #adminWarning { color: #ccc; margin-bottom: 20px; font-size: 0.85rem; font-weight: 300; }
        .footer-text { margin-top: 20px; font-size: 0.85rem; color: #aaa; }
        .footer-text a { color: var(--accent); text-decoration: none; font-weight: bold; }
    </style>
</head>
<body class="dark-ocean" id="bodyTheme">

    <div class="auth-card">
        <div class="logo-area"><i class="fas fa-user-plus"></i></div>
        <h2 style="color: #fff; font-weight: 800; letter-spacing: 2px;">REGISTER</h2>
        <p id="adminWarning">অপেক্ষা করুন...</p>
        
        <form id="registerForm">
            <div class="input-group">
                <i class="fas fa-user"></i>
                <input type="text" id="username" class="form-control" placeholder="আপনার পুরো নাম" required>
            </div>

            <div class="input-group">
                <i class="fas fa-envelope"></i>
                <input type="email" id="email" class="form-control" placeholder="ইমেইল এড্রেস" required>
            </div>
            
            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input type="password" id="regPassword" class="form-control" placeholder="পাসওয়ার্ড দিন" required>
            </div>

            <button type="submit" class="btn-auth" id="regBtn">অ্যাকাউন্ট তৈরি করুন</button>
        </form>
        
        <div class="footer-text">
            ইতিমধ্যেই অ্যাকাউন্ট আছে? <a href="login.html">লগইন করুন</a>
        </div>
    </div>

    <script>
        // ১. অ্যাডমিন সেটিংস ও থিম লোড করা (লগইন পেজের মতো)
        window.onload = async () => {
            try {
                const res = await fetch('/api/admin/get-settings');
                const settings = await res.json();
                
                // রেজিস্ট্রেশন নোটিশ সেট করা
                document.getElementById('adminWarning').innerText = settings.registerNotice || "নতুন অ্যাকাউন্ট তৈরি করতে সঠিক তথ্য দিন।";

                // থিম সেট করা
                if(settings.themeConfig?.loginTheme) {
                    document.getElementById('bodyTheme').className = settings.themeConfig.loginTheme;
                }
            } catch (err) { 
                document.getElementById('adminWarning').innerText = "গৌরব ভাইয়ের প্যানেলে স্বাগতম!";
            }
        };

        // ২. রেজিস্ট্রেশন হ্যান্ডলার
        document.getElementById("registerForm").addEventListener("submit", async function(e) {
            e.preventDefault();
            const regBtn = document.getElementById('regBtn');
            regBtn.innerText = "প্রসেসিং হচ্ছে...";
            regBtn.disabled = true;

            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('regPassword').value;

            try {
                const res = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, password })
                });
                const data = await res.json();
                
                if (res.ok) {
                    alert("গৌরব ভাইয়ের প্যানেলে আপনার রেজিস্ট্রেশন সফল! এখন লগইন করুন। 🙏");
                    window.location.href = 'login.html';
                } else {
                    alert(data.error || "রেজিস্ট্রেশন ব্যর্থ হয়েছে!");
                    regBtn.innerText = "অ্যাকাউন্ট তৈরি করুন";
                    regBtn.disabled = false;
                }
            } catch (err) {
                alert("সার্ভার কানেকশন এরর!");
                regBtn.innerText = "অ্যাকাউন্ট তৈরি করুন";
                regBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
