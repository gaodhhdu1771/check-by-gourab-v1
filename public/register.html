<body>

    <div class="register-card">
        <i class="fas fa-user-plus fa-3x" style="color: var(--accent); margin-bottom: 15px;"></i>
        <h2>REGISTER</h2>
        
        <div id="adminWarning">গৌরব ভাইয়ের প্যানেলে স্বাগতম! অ্যাকাউন্ট খুলে অপেক্ষা করুন।</div>
        
        <form id="registerForm">
            <div class="input-group">
                <i class="fas fa-user"></i>
                <input type="text" id="name" class="form-control" placeholder="আপনার পুরো নাম" required>
            </div>

            <div class="input-group">
                <i class="fas fa-phone"></i>
                <input type="text" id="phone" class="form-control" placeholder="ফোন নাম্বার" required>
            </div>

            <div class="input-group">
                <i class="fas fa-envelope"></i>
                <input type="email" id="email" class="form-control" placeholder="ইমেইল এড্রেস" required>
            </div>
            
            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input type="password" id="password" class="form-control" placeholder="পাসওয়ার্ড" required>
                <span class="toggle-password" onclick="togglePass()">
                    <i class="fas fa-eye-slash" id="regEyeIcon"></i>
                </span>
            </div>

            <button type="submit" class="btn-register">Create Account</button>
        </form>

        <div class="footer-text">
            ইতিমধ্যেই অ্যাকাউন্ট আছে? <a href="login.html">লগইন করুন</a>
        </div>
    </div>

    <script>
        // ১. রেজিস্ট্রেশন হ্যান্ডলার
        document.getElementById("registerForm").addEventListener("submit", async function(e) {
            e.preventDefault();
            
            alert("গৌরব ভাইয়ের এই সাইটে রেজিস্টার করার জন্য আপনাকে অনেক অনেক ধন্যবাদ 🙏\n\nসতর্কতা: এই সাইট থেকে কোনো তথ্য চুরির চেষ্টা করবেন না, করলে আইডি ব্লক করা হবে।");

            const name = document.getElementById('name').value;
            const phone = document.getElementById('phone').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const res = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, phone, email, password })
                });
                const data = await res.json();
                
                if (res.ok) {
                    // পেন্ডিং পেজের জন্য ইউজারের আইডি লোকাল স্টোরেজে সেভ করা হলো
                    localStorage.setItem('userId', data.userId);
                    alert("রেজিস্ট্রেশন সফল! এখন আপনার তথ্য যাচাই করা হবে।");
                    window.location.href = 'pending.html';
                } else {
                    alert(data.error || "রেজিস্ট্রেশন ব্যর্থ হয়েছে!");
                }
            } catch (err) {
                alert("সার্ভার কানেকশন এরর!");
            }
        });

        function togglePass() {
            const input = document.getElementById('password');
            const icon = document.getElementById('regEyeIcon');
            if (input.type === "password") {
                input.type = "text";
                icon.classList.replace("fa-eye-slash", "fa-eye");
            } else {
                input.type = "password";
                icon.classList.replace("fa-eye", "fa-eye-slash");
            }
        }
    </script>
</body>
