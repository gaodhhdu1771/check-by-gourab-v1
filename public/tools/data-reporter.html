<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Analytics Reporter - Professional Data Summary</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
  
  <style>
    body { 
      background: linear-gradient(135deg, #0f172a 0%, #1e2937 100%); 
      font-family: 'Segoe UI', system-ui, sans-serif;
    }
    .glass { 
      background: rgba(15, 23, 42, 0.92); 
      backdrop-filter: blur(20px); 
      border: 1px solid rgba(148, 163, 184, 0.25);
    }
    .report-card {
      background: linear-gradient(160deg, #1e2937, #334155);
      border: 1px solid #64748b;
      box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.6);
    }
  </style>
</head>
<body class="text-white min-h-screen pb-12">
  <div class="max-w-3xl mx-auto p-4">
    <h1 class="text-4xl font-bold text-center mb-2 bg-gradient-to-r from-cyan-400 to-purple-500 bg-clip-text text-transparent">Analytics Reporter</h1>
    <p class="text-center text-gray-400 mb-8">Professional Business Data Summary Tool</p>

    <div class="glass rounded-3xl p-8">
      <div class="grid grid-cols-2 gap-6 mb-8">
        <div>
          <label class="block text-sm mb-2 text-gray-300">Operator Name <span class="text-red-500">*</span></label>
          <input id="workerName" type="text" class="w-full bg-slate-900 border border-slate-700 rounded-2xl py-3 px-4 focus:outline-none focus:border-cyan-400" placeholder="Your Name">
        </div>
        <div>
          <label class="block text-sm mb-2 text-gray-300">Unit Price <span class="text-red-500">*</span></label>
          <input id="basePrice" type="number" value="20" class="w-full bg-slate-900 border border-slate-700 rounded-2xl py-3 px-4 focus:outline-none focus:border-cyan-400">
        </div>
      </div>

      <div class="mb-8">
        <label class="block text-sm mb-2 text-gray-300">Client Name</label>
        <input id="buyerName" type="text" class="w-full bg-slate-900 border border-slate-700 rounded-2xl py-3 px-4 focus:outline-none focus:border-cyan-400" placeholder="Client Name">
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
        <div>
          <label class="block text-emerald-400 text-sm font-medium mb-2">Primary Data List</label>
          <textarea id="workerList" rows="6" class="w-full bg-slate-900 border border-slate-700 rounded-3xl p-5 text-sm font-mono focus:outline-none focus:border-emerald-400 resize-none" placeholder="পাস্তে প্রাইমারি ডাটা লিস্ট..."></textarea>
        </div>
        <div>
          <label class="block text-amber-400 text-sm font-medium mb-2">Reference Data List</label>
          <textarea id="reportList" rows="6" class="w-full bg-slate-900 border border-slate-700 rounded-3xl p-5 text-sm font-mono focus:outline-none focus:border-amber-400 resize-none" placeholder="পাস্তে রেফারেন্স লিস্ট..."></textarea>
        </div>
      </div>

      <button onclick="generateReport()" 
              class="w-full bg-gradient-to-r from-cyan-500 to-purple-600 hover:brightness-110 py-5 rounded-3xl text-xl font-bold flex items-center justify-center gap-3 transition-all active:scale-95">
        <i class="fas fa-file-export"></i> Compile Summary Report
      </button>
    </div>

    <div id="reportArea" class="hidden mt-12">
      <div class="flex justify-between items-center mb-6 px-2">
        <h2 class="text-2xl font-bold text-white">Summary Preview</h2>
        <div class="flex gap-3">
          <button onclick="downloadReport()" 
                  class="bg-emerald-600 hover:bg-emerald-700 px-6 py-3 rounded-2xl flex items-center gap-2 font-medium transition-all">
            <i class="fas fa-download"></i> Save as Image
          </button>
          <button onclick="closeReport()" 
                  class="bg-slate-700 hover:bg-slate-600 px-6 py-3 rounded-2xl flex items-center gap-2 font-medium transition-all">
            <i class="fas fa-times"></i> Dismiss
          </button>
        </div>
      </div>

      <div id="reportCard" class="report-card mx-auto max-w-md rounded-3xl p-8">
        <div class="text-center mb-6">
          <h1 class="text-3xl font-bold tracking-widest text-white">SUMMARY REPORT</h1>
          <p class="text-cyan-300 text-sm">Data Integrity Overview</p>
        </div>

        <div class="text-center mb-8">
          <p class="text-gray-400 text-sm">Prepared For</p>
          <p id="buyerDisplay" class="text-3xl font-bold text-cyan-300"></p>
        </div>

        <div class="space-y-5 text-sm">
          <div class="flex justify-between">
            <span class="text-gray-400">Date</span>
            <span id="dateDisplay" class="font-medium"></span>
          </div>
          <div class="flex justify-between">
            <span class="text-gray-400">Operator</span>
            <span id="workerDisplay" class="font-medium"></span>
          </div>

          <div class="h-px bg-slate-600 my-4"></div>

          <div class="grid grid-cols-2 gap-4">
            <div class="bg-slate-900/60 rounded-2xl p-4 text-center">
              <p class="text-xs text-gray-400">Total Entries</p>
              <p id="totalWorker" class="text-3xl font-bold mt-1"></p>
            </div>
            <div class="bg-slate-900/60 rounded-2xl p-4 text-center">
              <p class="text-xs text-gray-400">Ref. Match</p>
              <p id="totalReport" class="text-3xl font-bold mt-1"></p>
            </div>
          </div>

          <div class="bg-emerald-900/40 border border-emerald-500 rounded-2xl p-6 text-center">
            <p class="text-emerald-100 text-lg">Processed Units</p>
            <p id="goodCount" class="text-6xl font-bold text-emerald-400 mt-2"></p>
            <p id="calculationText" class="text-xs text-emerald-300 mt-3"></p>
          </div>

          <div class="grid grid-cols-2 gap-4 text-center text-xs">
            <div class="bg-amber-900/30 border border-amber-600 rounded-2xl p-4">
              <p class="text-amber-300">Data Hits</p>
              <p id="foundCount" class="text-3xl font-bold"></p>
            </div>
            <div class="bg-red-900/30 border border-red-600 rounded-2xl p-4">
              <p class="text-red-300">Mismatch</p>
              <p id="extraCount" class="text-3xl font-bold"></p>
            </div>
          </div>

          <div class="text-center mt-8 pt-6 border-t border-slate-600">
            <p id="totalAmount" class="text-5xl font-bold text-emerald-400"></p>
            <p class="text-xs text-gray-400 mt-1">Net Valuation</p>
          </div>
        </div>

        <div class="text-center mt-10 pt-6 border-t border-slate-700 text-xs text-gray-400">
          Generated By: <span id="generatedByFooter" class="text-cyan-300 font-medium"></span>
        </div>
      </div>
    </div>
  </div>

  <script>
    // জাভাস্ক্রিপ্ট লজিক আগের মতোই থাকবে, শুধু ডিসপ্লে টেক্সট এডিট করা হয়েছে
    function generateReport() {
      const workerName = document.getElementById('workerName').value.trim() || "Operator";
      const basePrice = parseFloat(document.getElementById('basePrice').value) || 20;
      const buyerName = document.getElementById('buyerName').value.trim() || "Client";

      let workerEmails = document.getElementById('workerList').value.trim().split('\n').filter(e => e.trim().length > 0);
      let reportEmails = document.getElementById('reportList').value.trim().split('\n').filter(e => e.trim().length > 0);

      const workerSet = new Set(workerEmails);
      const reportSet = new Set(reportEmails);

      let good = 0, found = 0, extra = 0;
      reportEmails.forEach(email => workerSet.has(email) ? found++ : extra++);
      workerEmails.forEach(email => !reportSet.has(email) ? good++ : null);

      const totalAmount = good * basePrice;
      const now = new Date();
      const dateStr = now.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });

      document.getElementById('buyerDisplay').textContent = buyerName;
      document.getElementById('dateDisplay').textContent = dateStr;
      document.getElementById('workerDisplay').textContent = workerName;
      document.getElementById('totalWorker').textContent = workerEmails.length;
      document.getElementById('totalReport').textContent = reportEmails.length;
      document.getElementById('goodCount').textContent = good;
      document.getElementById('foundCount').textContent = found;
      document.getElementById('extraCount').textContent = extra;
      document.getElementById('totalAmount').textContent = totalAmount.toLocaleString() + " BDT";
      document.getElementById('calculationText').textContent = `${good} Units × ${basePrice} Valuation`;
      document.getElementById('generatedByFooter').textContent = workerName;

      document.getElementById('reportArea').classList.remove('hidden');
    }

    async function downloadReport() {
      const card = document.getElementById('reportCard');
      const canvas = await html2canvas(card, { scale: 2, backgroundColor: '#1e2937' });
      const link = document.createElement('a');
      link.download = `Summary_Report.png`;
      link.href = canvas.toDataURL('image/png');
      link.click();
    }

    function closeReport() {
      document.getElementById('reportArea').classList.add('hidden');
    }
  </script>
</body>
          </html>
