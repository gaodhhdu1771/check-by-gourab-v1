<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Geo-Sync Timezone Finder</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body { background: #020617; font-family: 'Inter', sans-serif; }
    .neon-card {
      background: rgba(15, 23, 42, 0.8);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(56, 189, 248, 0.2);
      box-shadow: 0 0 30px rgba(56, 189, 248, 0.1);
    }
    .time-display {
      font-size: 4rem;
      font-weight: 800;
      background: linear-gradient(to bottom, #fff, #94a3b8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 0 10px rgba(255,255,255,0.3));
    }
    .glitter-border {
      position: relative;
      overflow: hidden;
    }
    .glitter-border::after {
      content: '';
      position: absolute;
      top: -50%; left: -50%;
      width: 200%; height: 200%;
      background: conic-gradient(transparent, rgba(56, 189, 248, 0.3), transparent 30%);
      animation: rotate 4s linear infinite;
    }
    @keyframes rotate { 100% { transform: rotate(360deg); } }
  </style>
</head>
<body class="text-slate-100 min-h-screen flex items-center justify-center p-6">

  <div class="max-w-2xl w-full">
    <div class="text-center mb-8">
      <h1 class="text-3xl font-black text-sky-400 tracking-widest uppercase">Geo-Sync Timezone</h1>
      <p class="text-slate-500 text-sm">Synchronizing with Global Atomic Clocks</p>
    </div>

    <div class="neon-card rounded-[3rem] p-10 relative overflow-hidden">
      <div class="text-center mb-10">
        <div id="currentTime" class="time-display leading-none">00:00:00</div>
        <div id="currentDate" class="text-sky-500 font-bold tracking-[0.3em] uppercase mt-2">Loading Date...</div>
      </div>

      <div class="flex justify-center mb-10">
        <button onclick="syncTimezone()" class="bg-sky-500 hover:bg-sky-400 text-slate-900 px-8 py-3 rounded-full font-black flex items-center gap-3 transition-all active:scale-95">
          <i class="fas fa-satellite-dish"></i> SYNC NOW
        </button>
      </div>

      <div id="zoneInfo" class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <p class="col-span-full text-center text-slate-500 italic">Click Sync to fetch local timezone data</p>
      </div>
    </div>
  </div>

  <script>
    // Live Clock Function
    function updateClock() {
      const now = new Date();
      document.getElementById('currentTime').innerText = now.toLocaleTimeString('en-US', { hour12: false });
      document.getElementById('currentDate').innerText = now.toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric' });
    }
    setInterval(updateClock, 1000);
    updateClock();

    async function syncTimezone() {
      const zoneInfo = document.getElementById('zoneInfo');
      zoneInfo.innerHTML = '<div class="col-span-full text-center animate-pulse text-sky-400">Requesting Geo-Data...</div>';

      try {
        const res = await fetch('https://ipapi.co/json/');
        const data = await res.json();
        
        const details = [
          { label: 'Target Zone', value: data.timezone, icon: 'fa-globe' },
          { label: 'UTC Offset', value: data.utc_offset, icon: 'fa-plus-minus' },
          { label: 'Country/City', value: `${data.country_name}, ${data.city}`, icon: 'fa-city' },
          { label: 'Currency', value: data.currency, icon: 'fa-coins' },
          { label: 'Calling Code', value: data.country_calling_code, icon: 'fa-phone' },
          { label: 'Sun Status', value: 'Live Detection', icon: 'fa-sun' }
        ];

        let html = '';
        details.forEach(item => {
          html += `
            <div class="bg-slate-900/50 border border-slate-800 p-4 rounded-2xl flex items-center gap-4">
              <div class="text-sky-400 bg-sky-500/10 w-10 h-10 rounded-lg flex items-center justify-center">
                <i class="fas ${item.icon}"></i>
              </div>
              <div>
                <p class="text-[10px] text-slate-500 uppercase font-bold">${item.label}</p>
                <p class="text-sm font-bold text-slate-200">${item.value}</p>
              </div>
            </div>`;
        });
        zoneInfo.innerHTML = html;

      } catch (e) {
        zoneInfo.innerHTML = '<div class="col-span-full text-center text-red-500">Sync Failed. Try Again.</div>';
      }
    }
  </script>
</body>
</html>
