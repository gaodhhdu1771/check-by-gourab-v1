<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Check by Gourab</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .register-container { background: #fff; padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h2 { text-align: center; color: #333; }
        .input-group { margin-bottom: 15px; position: relative; }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        .toggle-password { position: absolute; right: 10px; top: 12px; cursor: pointer; font-size: 18px; }
        button { width: 100%; padding: 12px; background-color: #007bff; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: bold; }
        button:hover { background-color: #0056b3; }
        .footer-text { text-align: center; margin-top: 15px; font-size: 14px; color: #666; }
    </style>
</head>
<body>

<div class="register-container">
    <h2>নতুন একাউন্ট তৈরি করুন</h2>
    <form id="registerForm">
        <div class="input-group">
            <input type="text" id="username" placeholder="আপনার নাম" required>
        </div>
        <div class="input-group">
            <input type="email" id="email" placeholder="ইমেইল এড্রেস" required>
        </div>
        <div class="input-group">
            <input type="password" id="password" placeholder="পাসওয়ার্ড" required>
            <span class="toggle-password" onclick="togglePassword()" id="toggleIcon">🙈</span>
        </div>
        <button type="submit">রেজিস্টার করুন</button>
    </form>
    <p class="footer-text">ইতিমধ্যে একাউন্ট আছে? <a href="login.html">লগইন করুন</a></p>
</div>

<script>
    // পাসওয়ার্ড দেখা বা লুকানোর ফাংশন
    function togglePassword() {
        const passwordInput = document.getElementById("password");
        const toggleIcon = document.getElementById("toggleIcon");
        if (passwordInput.type === "password") {
            passwordInput.type = "text";
            toggleIcon.innerText = "👁️";
        } else {
            passwordInput.type = "password";
            toggleIcon.innerText = "🙈";
        }
    }

    // রেজিস্ট্রেশন ফর্ম সাবমিট
    document.getElementById("registerForm").addEventListener("submit", function(e) {
        e.preventDefault();
        
        // আপনার বলা সেই বিশেষ মেসেজ
        const customMessage = "গৌরব ভাইয়ের এই সাইটে রেজিস্টার করার জন্য আপনাকে অনেক অনেক ধন্যবাদ 🙏\n\nএই সাইট থেকে কোন ডাটা বা admin এর personal কোনো information কিছু নেওয়ার চেষ্টা করবেন না। যদি নেওয়ার চেষ্টা করেন আপনাকে সাইট থেকে ব্লক করা হবে। ভদ্রভাবে কাজ করার জন্য ধন্যবাদ। কোন কিছু হলে অ্যাডমিনকে বলুন।";
        
        alert(customMessage);
        
        // এখানে আপনার ব্যাকএন্ডে ডাটা পাঠানোর কোড থাকবে
        console.log("Registration attempt...");
    });
</script>

</body>
</html>
